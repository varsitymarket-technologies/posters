<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">

<title>Varsity Market - Poster</title>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

body {
background: #111;
display: flex;
justify-content: center;
align-items: center;
min-height: 100vh;
font-family: ‘Barlow’, sans-serif;
}

.poster {
width: 595px;
height: 842px;
position: relative;
overflow: hidden;
background: #0a0a0a;
}

/* Grainy texture overlay */
.poster::before {
content: ‘’;
position: absolute;
inset: 0;
background-image: url(“data:image/svg+xml,%3Csvg viewBox=‘0 0 256 256’ xmlns=‘http://www.w3.org/2000/svg’%3E%3Cfilter id=‘noise’%3E%3CfeTurbulence type=‘fractalNoise’ baseFrequency=‘0.9’ numOctaves=‘4’ stitchTiles=‘stitch’/%3E%3C/filter%3E%3Crect width=‘100%25’ height=‘100%25’ filter=‘url(%23noise)’ opacity=‘0.08’/%3E%3C/svg%3E”);
opacity: 0.35;
z-index: 2;
pointer-events: none;
}

/* Background photo simulation - dark gradient with texture */
.bg {
position: absolute;
inset: 0;
background:
radial-gradient(ellipse at 60% 30%, rgba(255,255,255,0.04) 0%, transparent 60%),
radial-gradient(ellipse at 20% 70%, rgba(255,255,255,0.02) 0%, transparent 50%),
linear-gradient(160deg, #1a1a1a 0%, #0a0a0a 50%, #111 100%);
z-index: 0;
}

/* Abstract grunge background shapes */
.bg-shapes {
position: absolute;
inset: 0;
z-index: 1;
}

.bg-shapes svg {
width: 100%;
height: 100%;
opacity: 0.07;
}

/* Dark vignette overlay */
.vignette {
position: absolute;
inset: 0;
background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.7) 100%);
z-index: 3;
pointer-events: none;
}

/* Bottom dark fade */
.bottom-fade {
position: absolute;
bottom: 0;
left: 0;
right: 0;
height: 300px;
background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.85));
z-index: 3;
}

/* Content layer */
.content {
position: relative;
z-index: 10;
height: 100%;
display: flex;
flex-direction: column;
padding: 36px 40px;
}

/* Header row */
.header {
display: flex;
justify-content: space-between;
align-items: flex-start;
}

/* VM Logo SVG */
.logo {
width: 64px;
height: 64px;
opacity: 0.95;
}

/* QR code placeholder */
.qr {
width: 72px;
height: 72px;
background: white;
padding: 6px;
display: flex;
align-items: center;
justify-content: center;
}

.qr svg {
width: 100%;
height: 100%;
}

/* Main body */
.body {
flex: 1;
display: flex;
flex-direction: column;
justify-content: flex-end;
padding-bottom: 16px;
}

.tag-line {
font-family: ‘Barlow Condensed’, sans-serif;
font-weight: 600;
font-size: 13px;
letter-spacing: 4px;
text-transform: uppercase;
color: rgba(255,255,255,0.5);
margin-bottom: 12px;
}

.headline {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 82px;
line-height: 0.92;
color: #ffffff;
letter-spacing: 1px;
margin-bottom: 24px;
}

.headline span.accent {
color: #ffffff;
-webkit-text-stroke: 2px white;
color: transparent;
}

.divider {
width: 48px;
height: 2px;
background: white;
margin-bottom: 20px;
opacity: 0.6;
}

.body-text {
font-family: ‘Barlow’, sans-serif;
font-size: 13px;
font-weight: 300;
color: rgba(255,255,255,0.55);
line-height: 1.7;
max-width: 320px;
margin-bottom: 36px;
}

/* Footer */
.footer {
display: flex;
justify-content: space-between;
align-items: flex-end;
border-top: 1px solid rgba(255,255,255,0.12);
padding-top: 16px;
}

.url {
font-family: ‘Barlow Condensed’, sans-serif;
font-weight: 600;
font-size: 11px;
letter-spacing: 3px;
text-transform: uppercase;
color: rgba(255,255,255,0.4);
}

.cta {
font-family: ‘Barlow Condensed’, sans-serif;
font-weight: 700;
font-size: 11px;
letter-spacing: 3px;
text-transform: uppercase;
color: white;
border: 1px solid rgba(255,255,255,0.4);
padding: 6px 16px;
}

/* Decorative vertical text */
.vert-text {
position: absolute;
right: 40px;
top: 50%;
transform: translateY(-50%) rotate(90deg);
transform-origin: center center;
font-family: ‘Barlow Condensed’, sans-serif;
font-size: 10px;
letter-spacing: 5px;
color: rgba(255,255,255,0.12);
text-transform: uppercase;
z-index: 10;
white-space: nowrap;
}

/* Large BG number / watermark */
.bg-word {
position: absolute;
bottom: 120px;
right: -10px;
font-family: ‘Bebas Neue’, sans-serif;
font-size: 180px;
color: rgba(255,255,255,0.03);
z-index: 4;
line-height: 1;
pointer-events: none;
letter-spacing: -4px;
}
</style>

</head>
